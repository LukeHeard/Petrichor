services:
  # The service keys below ("backend"/"frontend") are how containers find each other on
  # the compose-managed network - Docker Compose registers each one as a DNS name
  # automatically, independent of `container_name`. Rename `container_name` freely (e.g.
  # to avoid colliding with another app's containers on the same host) without touching
  # anything else; DO NOT rename the service keys themselves unless you also update every
  # reference to them below (BACKEND_URL, depends_on).
  backend:
    container_name: petrichor-backend
    image: ${BACKEND_IMAGE:-ghcr.io/lukeheard/petrichor-backend:latest}
    build: ./backend
    volumes:
      - kuzu_data:/app/data
    ports:
      # Change the left-hand side to use a different host port.
      - "8000:8000"
    environment:
      - DATABASE_PATH=/app/data/kuzu
      # Kindle progress sync (optional). Copy these from a logged-in
      # read.amazon.com browser session; see .env.example. The integration runs
      # inside this container via curl_cffi - no extra service is needed.
      - KINDLE_COOKIES=${KINDLE_COOKIES:-}
      - KINDLE_DEVICE_TOKEN=${KINDLE_DEVICE_TOKEN:-}
      # Set to 1 to serve a fake Kindle library for testing without an account.
      - KINDLE_MOCK=${KINDLE_MOCK:-}
    restart: always

  frontend:
    container_name: petrichor-frontend
    image: ${FRONTEND_IMAGE:-ghcr.io/lukeheard/petrichor-frontend:latest}
    build:
      context: ./frontend
      # NEXT_PUBLIC_API_URL is compiled into the client bundle at build time, so it must
      # be passed here rather than under `environment:` (which only applies at container
      # start - too late for a NEXT_PUBLIC_* var). BACKEND_URL is read live at request
      # time by middleware.ts, so it belongs under `environment:` instead.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # Change the left-hand side to use a different host port.
      - "3000:3000"
    environment:
      # "backend" here is the service key above, not container_name - this line never
      # needs to change even if you rename container_name.
      - BACKEND_URL=http://backend:8000
    restart: always

volumes:
  kuzu_data:
