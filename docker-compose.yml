services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - kuzu_data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_PATH=/app/data/kuzu
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8000}
    restart: always

volumes:
  kuzu_data:
