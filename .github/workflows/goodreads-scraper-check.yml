name: Goodreads scraper check

on:
  schedule:
    # :17 rather than :00 to avoid piling onto the top-of-hour spike every
    # scheduled Action on GitHub competes for.
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx==0.25.1

      - name: Run scraper smoke test
        id: smoke_test
        run: python backend/scripts/check_goodreads_scraper.py

      - name: File an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Goodreads scraper check is failing";
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "scraper-broken",
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Still failing: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ["scraper-broken"],
                body: `The hourly Goodreads scraper check failed, which likely means goodreads.com changed its markup/API and \`GoodreadsScraper\` needs updating.\n\nFailed run: ${runUrl}\n\nThis issue will get a new comment on each subsequent failure rather than a duplicate issue. Close it once the scraper is fixed.`,
              });
            }
